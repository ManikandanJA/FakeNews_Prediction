<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login | FakeNewsDetector</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
</head>
<body class="auth-body">

<nav class="navbar">
  <div class="nav-brand">
    <span class="logo-icon">🔍</span>
    <span class="logo-text">FakeNewsDetector</span>
  </div>
  <div class="nav-links">
    <a href="{{ url_for('index') }}">Home</a>
    <a href="{{ url_for('about') }}">About</a>
    <a href="{{ url_for('login') }}" class="active">Login</a>
    <a href="{{ url_for('signup') }}" class="btn-nav-signup">Sign Up</a>
  </div>
</nav>

<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-icon">🔐</div>
      <h2>Welcome Back</h2>
      <p>Login to detect fake news</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="alert alert-{{ cat }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="{{ url_for('login') }}">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="Enter your username" required autofocus/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Enter your password" required/>
      </div>
      <button type="submit" class="btn btn-primary btn-full">Login →</button>
    </form>

    <p class="auth-switch">Don't have an account? <a href="{{ url_for('signup') }}">Sign Up Free</a></p>
  </div>
</div>

</body>
</html>
